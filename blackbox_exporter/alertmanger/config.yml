global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 15m
  receiver: 'alertmanager-bot'

  routes:
    - match_re:
        alertname: "SiteDown|SlowResponseTime|SlowProbeResponse|SlowDNSLookup|SSLCertExpiringSoon|SSLCertExpiringCritical"
      receiver: 'telegram-blackbox'
      
receivers:
- name: 'alertmanager-bot'
  webhook_configs:
    - send_resolved: true
      url: 'http://grafana_alertmanager-bot_1:8080'

- name: 'telegram-blackbox'
  telegram_configs:
    - bot_token: 'Your-telegram-token'
      chat_id: your-chat-id
      parse_mode: 'HTML'
      send_resolved: true
      message: |
        {{ range .Alerts }}
        {{ if eq .Status "resolved" }}
        {{ if eq .Labels.alertname "SiteDown" }}✅ <b>SITE RECOVERED</b>
        {{ else if eq .Labels.alertname "SlowDNSLookup" }}✅ <b>DNS LOOKUP NORMALIZED</b>
        {{ else if eq .Labels.alertname "SlowProbeResponse" }}✅ <b>PROBE NORMALIZED</b>
        {{ else if eq .Labels.alertname "SlowResponseTime" }}✅ <b>RESPONSE TIME NORMALIZED</b>
        {{ else if eq .Labels.alertname "SSLCertExpiringSoon" }}✅ <b>SSL CERT RENEWED</b>
        {{ else if eq .Labels.alertname "SSLCertExpiringCritical" }}✅ <b>SSL CERT RENEWED</b>
        {{ else }}✅ <b>RECOVERED</b>{{ end }}
        ━━━━━━━━━━━
        🌐 <b>URL:</b> {{ .Labels.instance }}
        🔔 <b>Alert:</b> {{ .Labels.alertname }}
        📊 <b>Severity:</b> {{ .Labels.severity | toUpper }}
        🕐 <b>Resolved:</b> {{ (.EndsAt.Add 14400000000000).Format "2006-01-02 15:04:05" }} (Baku)
        ━━━━━━━━━━━
        {{ else }}
        {{ if eq .Labels.alertname "SiteDown" }}🚨 <b>SITE DOWN</b>
        {{ else if eq .Labels.alertname "SlowDNSLookup" }}⚠️ <b>SLOW DNS LOOKUP</b>
        {{ else if eq .Labels.alertname "SlowProbeResponse" }}⚠️ <b>SLOW PROBE RESPONSE</b>
        {{ else if eq .Labels.alertname "SlowResponseTime" }}⚠️ <b>SLOW RESPONSE TIME</b>
        {{ else if eq .Labels.alertname "SSLCertExpiringSoon" }}🔐 <b>SSL CERT EXPIRING SOON</b>
        {{ else if eq .Labels.alertname "SSLCertExpiringCritical" }}🔴 <b>SSL CERT EXPIRING — CRITICAL</b>
        {{ else }}🚨 <b>ALERT</b>{{ end }}
        ━━━━━━━━━━━
        🌐 <b>URL:</b> {{ .Labels.instance }}
        🔔 <b>Alert:</b> {{ .Labels.alertname }}
        📊 <b>Severity:</b> {{ .Labels.severity | toUpper }}
        📝 <b>Info:</b> {{ .Annotations.description }}
        🕐 <b>Started:</b> {{ (.StartsAt.Add 14400000000000).Format "2006-01-02 15:04:05" }} (Baku)
        ━━━━━━━━━━━
        {{ end }}
        {{ end }}


inhibit_rules:

- source_match:
    severity: 'critical'
  target_match:
    severity: 'warning'
  equal: ['alertname', 'instance']

- source_match:
    severity: 'critical'
  target_match:
    severity: 'warning'
  equal: ['alertname', 'service', 'task']

- source_match:
    alertname: 'SiteDown'
  target_match_re:
    alertname: 'SlowResponseTime|SlowProbeResponse|SlowDNSLookup'
  equal: ['instance']
